<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Adiba 🤍</title>
<style>
body {
  margin:0;
  padding:0;
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color:white;
  overflow:hidden;
  text-align:center;
}

/* STARS */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://i.imgur.com/9QZ7Z6F.png');
  background-size:cover;
  animation:moveStars 50s linear infinite;
  z-index:0;
}
@keyframes moveStars{from{background-position:0 0;} to{background-position:1000px 1000px;}}

/* MOON */
.moon{
  position:absolute;
  top:5%;
  right:5%;
  width:60px;
  height:60px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 30px white;
}

/* LOCK SCREEN */
#lock{
  position:fixed;
  width:100%;
  height:100%;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}
#lock input{
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:12px;
  width:200px;
}

/* MAIN */
#main{
  display:none;
  position:relative;
  z-index:1;
}

/* BIG HEART */
.heart{
  position:relative;
  width:50vw;
  height:45vw;
  max-width:250px;
  max-height:225px;
  margin:60px auto;
  transform:rotate(-45deg);
}
.heart img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:rotate(45deg);
  border-radius:20px;
  box-shadow:0 0 40px pink;
}

/* SMALL HEARTS */
.small{
  position:absolute;
  width:15vw;
  height:15vw;
  max-width:60px;
  max-height:60px;
  transform:rotate(-45deg);
  animation:float 6s linear infinite;
}
.small img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:rotate(45deg);
}
@keyframes float{from{transform:translateY(100vh) rotate(-45deg);} to{transform:translateY(-10vh) rotate(-45deg);}}

/* TEXT */
#text{
  max-width:90%;
  margin:auto;
  font-size:16px;
  line-height:1.5;
}

/* BUTTONS */
button{
  padding:10px 20px;
  margin:10px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:16px;
}
#yes{background:#28a745;color:white;}
#no{background:#dc3545;color:white;position:absolute;}

/* EMOJI */
#emoji{
  position:absolute;
  font-size:30px;
  display:none;
}

/* RING */
#ring{
  display:none;
  font-size:60px;
  animation:pop 1s ease forwards;
}
@keyframes pop{from{transform:scale(0);} to{transform:scale(1.5);}}
</style>
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>

<!-- LOCK SCREEN -->
<div id="lock">
<h2>Enter Secret 🤍</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="unlock()">Open 💌</button>
</div>

<!-- MAIN -->
<div id="main">
<h1>Adiba Bibi 🤍</h1>

<div class="heart">
<img src="https://res.cloudinary.com/dvtveaclf/image/upload/f_auto,q_auto/7291_ylyuz3">
</div>

<div id="ring">💍</div>

<p id="text"></p>

<button id="yes" onclick="yesClick()">Yes 💖</button>
<button id="no" onmouseover="moveNo()">No 😜</button>

<br>
<button onclick="share()">Share 💌</button>
</div>

<div id="emoji">🥺</div>

<!-- MUSIC -->
<audio id="bgMusic" loop autoplay muted playsinline>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio>
<audio id="yesMusic">
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
// UNLOCK SCREEN
function unlock(){
  if(document.getElementById("pass").value==="forever"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="block";
    typeWriter();
    document.getElementById("bgMusic").muted=false; // unmute music on unlock
  }else{
    alert("Wrong password 😜");
  }
}

// TYPING MESSAGE
let msg = "Adiba...\n\nFrom Mohammed Sadeq Ali 🤍\nYou are my peace, my dua, my everything.\nWill you be mine forever?";
let i=0;
function typeWriter(){
  if(i<msg.length){
    document.getElementById("text").innerHTML+=msg.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}

// FLOATING SMALL HEARTS
setInterval(()=>{
  let h=document.createElement("div");
  h.className="small";
  let imgs=[
"https://res.cloudinary.com/dvtveaclf/image/upload/f_auto,q_auto/7291_ylyuz3",
"https://res.cloudinary.com/dvtveaclf/image/upload/v1775071321/IMG_20231223_161938_ubrfw4.jpg"
  ];
  let img=document.createElement("img");
  img.src=imgs[Math.floor(Math.random()*2)];
  h.appendChild(img);
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

// NO BUTTON ESCAPE
function moveNo(){
  let btn=document.getElementById("no");
  let emoji=document.getElementById("emoji");
  let x=Math.random()*(window.innerWidth-100);
  let y=Math.random()*(window.innerHeight-50);
  btn.style.left=x+"px";
  btn.style.top=y+"px";
  emoji.style.display="block";
  emoji.style.left=(x+20)+"px";
  emoji.style.top=(y-30)+"px";
}

// YES BUTTON
function yesClick(){
  document.getElementById("bgMusic").pause();
  document.getElementById("yesMusic").play();
  document.getElementById("ring").style.display="block";
  setTimeout(()=>{
    document.body.innerHTML=`
      <h1 style="margin-top:20%;">Alhamdulillah 🤍</h1>
      <p>May Allah bless this beginning...</p>
      <h2>Mohammed Sadeq Ali 💖</h2>
    `;
  },2000);
}

// SHARE BUTTON
function share(){
  let text="A special message for you 💖";
  let url=window.location.href;
  window.open("https://wa.me/?text="+text+" "+url);
}
</script>
</body>
</html>
